name: Build Web

on:
  push:
    branches:
      - main
      - service-dart-fix
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web (HTML renderer, no PWA strict)
        run: |
          flutter build web --release \
            --no-tree-shake-icons \
            --pwa-strategy=none \
            --base-href=/watchtower/ || true
          # Fallback build with skipped renderer flags if the first failed
          if [ ! -f build/web/index.html ]; then
            flutter build web --release --no-tree-shake-icons || true
          fi
          ls -lah build/web || (echo "Web build did not produce output" && exit 1)

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchtower-web
          path: build/web
          if-no-files-found: error
          retention-days: 14
