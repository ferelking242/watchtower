name: Build & Deploy Web

on:
  push:
    branches: [main, master, service-dart-fix]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter info
        run: |
          flutter --version
          flutter config --enable-web
      - name: Configure web platform
        run: |
          flutter create . --platforms=web --project-name watchtower
          ls -la web
      - name: Pub get
        run: flutter pub get
      - name: Build web (lib/main_web.dart - native libs stubbed)
        run: |
          set -e
          set -o pipefail
          flutter build web \
            --release \
            --target lib/main_web.dart \
            --no-tree-shake-icons \
            --pwa-strategy=none \
            --base-href "/watchtower/" 2>&1 | tee build.log
      - name: Verify build output
        run: |
          echo "=== build/web (top) ==="
          ls -lah build/web
          echo "=== recursive ==="
          find build/web -maxdepth 3 -type f | head -100
          test -f build/web/index.html
          test -f build/web/main.dart.js
          test -f build/web/flutter_bootstrap.js
      - name: SPA fallback
        run: cp build/web/index.html build/web/404.html
      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: watchtower-web
          path: build/web
          if-no-files-found: error
          retention-days: 14
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
